<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
</head>
<body data-admin-page="login" data-title="Login">
    <div class="login-wrap">
        <form class="login-card" id="login-form" novalidate>
            <h1>Admin Login</h1>
            <p class="sub">Sign in to manage your portfolio content.</p>

            <div class="form-row">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="form-row">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button class="btn btn-primary" type="submit" id="login-btn" style="width:100%;">
                Sign in
            </button>

            <div id="login-error" class="error" style="margin-top: .75rem; display: none;"></div>

            <p style="margin-top: 1.25rem; font-size:.75rem; color: var(--text-mute); text-align: center;">
                Admin-only. Public site at <a href="/">/</a>.
            </p>
        </form>
    </div>

    <script src="/admin/assets/js/api.js"></script>
    <script src="/admin/assets/js/ui.js"></script>
    <script src="/admin/assets/js/shell.js"></script>
    <script>
        (function () {
            // If already logged in, jump straight to dashboard
            if (AdminAPI.token()) {
                AdminAPI.auth.me().then(() => location.href = '/admin').catch(() => AdminAPI.clearToken());
            }

            const form = document.getElementById('login-form');
            const btn  = document.getElementById('login-btn');
            const errBox = document.getElementById('login-error');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errBox.style.display = 'none';
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Signing in…';
                try {
                    const { token } = await AdminAPI.auth.login(
                        form.email.value.trim(),
                        form.password.value
                    );
                    AdminAPI.setToken(token);
                    location.href = '/admin';
                } catch (err) {
                    errBox.style.display = 'block';
                    errBox.textContent = err.message || 'Login failed.';
                    btn.disabled = false;
                    btn.innerHTML = 'Sign in';
                }
            });
        })();
    </script>
</body>
</html>
