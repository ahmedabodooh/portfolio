<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/css/admin.css">
</head>
<body data-admin-page="dashboard" data-title="Dashboard">
    <main id="page">
        <div id="dashboard-loading" class="loading">Loading dashboard…</div>
        <div id="dashboard-content" hidden>
            <div class="stat-grid" id="stat-grid"></div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.25rem;" class="dashboard-cols">
                <div class="card">
                    <h3 class="card-title">Your profile</h3>
                    <p class="card-sub">Edit in Settings →</p>
                    <dl id="profile-list" style="display:grid; grid-template-columns: auto 1fr; column-gap: 1rem; row-gap: .5rem; font-size: .875rem; margin: 0;"></dl>
                </div>

                <div class="card">
                    <h3 class="card-title">Quick links</h3>
                    <p class="card-sub">Jump to a section</p>
                    <div style="display: flex; flex-direction: column; gap: .5rem;">
                        <a class="btn btn-ghost" href="/admin/projects">Manage projects</a>
                        <a class="btn btn-ghost" href="/admin/blog">Manage blog</a>
                        <a class="btn btn-ghost" href="/admin/messages" id="messages-link">Messages</a>
                        <a class="btn btn-ghost" href="/admin/settings">Site settings</a>
                        <a class="btn btn-primary" href="/" target="_blank">View public site ↗</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/admin/assets/js/api.js"></script>
    <script src="/admin/assets/js/ui.js"></script>
    <script src="/admin/assets/js/shell.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!AdminAPI.token()) return;
            try {
                const data = await AdminAPI.dashboard();
                renderStats(data.counts);
                renderProfile(data.profile);
                document.getElementById('dashboard-loading').hidden = true;
                document.getElementById('dashboard-content').hidden = false;
            } catch (e) {
                if (e.status === 401) return;
                document.getElementById('dashboard-loading').textContent = 'Failed to load: ' + e.message;
            }
        });

        function renderStats(counts) {
            const grid = document.getElementById('stat-grid');
            const items = [
                { label: 'Projects',        value: counts.projects },
                { label: 'Blog posts',      value: counts.blog_posts },
                { label: 'Skills',          value: counts.skills },
                { label: 'Experiences',     value: counts.experiences },
                { label: 'Certifications',  value: counts.certifications },
                { label: 'Unread messages', value: counts.messages_unread },
                { label: 'All messages',    value: counts.messages_total },
            ];
            grid.innerHTML = items.map(i => `
                <div class="stat">
                    <div class="label">${i.label}</div>
                    <div class="value">${i.value ?? 0}</div>
                </div>
            `).join('');

            if (counts.messages_unread > 0) {
                const link = document.getElementById('messages-link');
                link.innerHTML = `Messages <span class="badge badge-warning" style="margin-left:auto;">${counts.messages_unread} unread</span>`;
            }
        }

        function renderProfile(profile) {
            const pl = document.getElementById('profile-list');
            pl.innerHTML = Object.entries(profile)
                .filter(([, v]) => v != null && v !== '')
                .map(([k, v]) => `
                    <dt style="color: var(--text-mute); font-weight: 500; text-transform: capitalize;">${escapeHtml(k.replace(/_/g, ' '))}</dt>
                    <dd style="margin: 0; font-weight: 500;">${escapeHtml(v)}</dd>
                `).join('');
        }
    </script>
</body>
</html>
