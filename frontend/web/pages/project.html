<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project · Ahmed Abo Dooh</title>
    <meta name="theme-color" content="#06070E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <script>(function(){try{const s=localStorage.getItem('ahmed-theme')??'light';document.documentElement.classList.toggle('dark',s==='dark');}catch(e){}})();</script>
</head>
<body data-page="project">
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-orb one"></div><div class="ambient-orb two"></div><div class="ambient-orb three"></div>
    </div>

    <div id="boot-screen" class="boot-screen" role="status">
        <div class="boot-content">
            <div class="boot-logo">a</div>
            <div class="boot-title">Case study</div>
            <div class="boot-subtitle">loading</div>
            <div class="boot-skeleton"><div class="boot-skel-card"></div><div class="boot-skel-card"></div><div class="boot-skel-card"></div><div class="boot-skel-card"></div></div>
        </div>
    </div>

    <div class="scroll-progress" id="scroll-progress"></div>
    <div id="nav-host"></div>

    <main>
        <article>
            <section class="container-wide pt-16 pb-12">
                <a href="/projects" class="flex items-center gap-2 text-sm muted link-underline" style="display:inline-flex;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="width:1rem;height:1rem;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 7L7 17M17 17H7V7"/></svg>
                    Back to archive
                </a>

                <div class="mt-8 flex flex-wrap items-center gap-3 text-xs reveal">
                    <span class="tag-chip" data-field="category">—</span>
                    <span class="muted-2" data-field="year"></span>
                    <span class="muted-2" data-field="role"></span>
                </div>

                <h1 data-field="title" class="reveal" style="margin-top:1.5rem; font-size: 6vw; font-weight: 600; letter-spacing: -0.04em; line-height: .95;">—</h1>
                <p data-field="tagline" class="mt-6 display-italic text-2xl md-text-3xl muted max-w-3xl reveal"></p>

                <div class="mt-10 flex flex-wrap gap-4 reveal">
                    <a data-field="live" href="#" target="_blank" rel="noopener" class="btn-primary" hidden>
                        Visit live site
                        <svg xmlns="http://www.w3.org/2000/svg" style="width:1rem;height:1rem;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l10-10M7 7h10v10"/></svg>
                    </a>
                    <a data-field="repo" href="#" target="_blank" rel="noopener" class="btn-ghost" hidden>Source code</a>
                </div>
            </section>

            <section class="container-wide pb-16">
                <div id="project-hero" class="glass aspect-detail reveal" style="overflow:hidden; padding:0;"></div>
            </section>

            <section class="container-narrow pb-16">
                <div class="grid" style="grid-template-columns: 1fr; gap: 2.5rem;">
                    <div class="space-y-6 reveal">
                        <p data-field="summary" class="text-xl leading-relaxed"></p>
                        <div data-field="description" class="prose-article"></div>
                        <div id="project-highlights-wrap" hidden style="padding-top: 1.5rem; border-top:1px solid rgba(255,255,255,0.05);">
                            <h3 class="text-xs uppercase widest muted-2 mb-4">Highlights</h3>
                            <ul id="project-highlights" class="space-y-3" style="list-style:none; padding:0;"></ul>
                        </div>
                    </div>
                    <aside class="reveal" style="padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
                        <dl id="project-meta" class="space-y-6 text-sm"></dl>
                    </aside>
                </div>
            </section>

            <section id="gallery-wrap" class="container-wide pb-16" hidden>
                <div style="padding-top: 3rem; border-top: 1px solid rgba(255,255,255,0.05);">
                    <h3 class="text-xs uppercase widest muted-2 mb-6">Gallery</h3>
                    <div id="project-gallery" class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 1rem;"></div>
                </div>
            </section>

            <section class="container-wide pb-16" id="next-project"></section>
        </article>
    </main>

    <div id="footer-host"></div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/shared.js"></script>
    <script src="/assets/js/main.js"></script>
</body>
</html>
